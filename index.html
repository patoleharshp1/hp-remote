<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HP Remote</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000000; color: #FFFFFF; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; height: 100vh; overflow: hidden; justify-content: space-between; padding: 40px 0; }
        
        /* Main Container */
        .remote-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; height: 100%; justify-content: space-around; }

        /* Huge D-Pad in the Middle */
        .d-pad { position: relative; width: 280px; height: 280px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(255,255,255,0.05); }
        .center-ok { width: 110px; height: 110px; background: #333333; border: none; border-radius: 50%; color: white; font-weight: bold; font-size: 20px; cursor: pointer; z-index: 5; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .center-ok:active { background: #444444; transform: scale(0.95); }
        
        .arrow { position: absolute; background: transparent; border: none; color: #FFFFFF; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .up { top: 15px; width: 100%; height: 60px; } 
        .down { bottom: 15px; width: 100%; height: 60px; } 
        .left { left: 15px; width: 60px; height: 100%; } 
        .right { right: 15px; width: 60px; height: 100%; }

        /* Bottom Controls Section */
        .bottom-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 25px; padding-bottom: 20px; }
        
        .row { display: flex; justify-content: center; gap: 30px; width: 100%; }
        .nav-btn { width: 75px; height: 75px; background: #1a1a1a; border: none; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .nav-btn:active { background: #333333; }
        .nav-btn.active { background: #FFFFFF; color: #000000; }

        .unlock-btn { width: 85%; height: 60px; background: #FFFFFF; color: #000000; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; letter-spacing: 1px; }
        
        #status { color: #555555; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        #hiddenInput { position: absolute; opacity: 0; pointer-events: none; }
        .apk-link { color: #444444; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

    <div class="remote-container">
        <h2 style="color:#222; font-size: 14px; margin:0;">HP HARSH OS 7</h2>

        <div class="d-pad">
            <button class="arrow up" onclick="handleDirection('UP')">▲</button>
            <button class="arrow left" onclick="handleDirection('LEFT')">◀</button>
            <button class="center-ok" onclick="send('OK')">OK</button>
            <button class="arrow right" onclick="handleDirection('RIGHT')">▶</button>
            <button class="arrow down" onclick="handleDirection('DOWN')">▼</button>
        </div>

        <div class="bottom-section">
            <div class="row">
                <button class="nav-btn" onclick="send('BACK')">↩</button>
                <button class="nav-btn" onclick="openKeyboard()">⌨</button>
                <button id="mouseBtn" class="nav-btn" onclick="toggleMouse()">🖱</button>
            </div>

            <button class="unlock-btn" onclick="send('UNLOCK')">UNLOCK SYSTEM</button>
            
            <p id="status">System Online</p>
            <a href="hp-remote.apk" class="apk-link" download>Download APK</a>
        </div>
    </div>

    <input type="text" id="hiddenInput">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADzCExTvEjwcjC6FK1kfmO7N-V_66nE",
            authDomain: "hp-remote-web.firebaseapp.com",
            projectId: "hp-remote-web",
            databaseURL: "https://hp-remote-web-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let mouseMode = false;

        window.toggleMouse = function() {
            mouseMode = !mouseMode;
            const btn = document.getElementById('mouseBtn');
            const status = document.getElementById('status');
            btn.classList.toggle('active', mouseMode);
            status.innerText = mouseMode ? "MOUSE MODE: ON" : "System Online";
        };

        window.handleDirection = function(dir) {
            send(mouseMode ? "MOUSE_" + dir : dir);
        };

        window.send = function(cmd) {
            set(ref(db, 'remote_command'), cmd);
            if(!mouseMode) {
                document.getElementById('status').innerText = "Sent: " + cmd;
                setTimeout(() => { document.getElementById('status').innerText = "System Online"; }, 800);
            }
        };

        window.openKeyboard = function() {
            document.getElementById('hiddenInput').focus();
        };

        document.getElementById('hiddenInput').addEventListener('input', (e) => {
            set(ref(db, 'remote_keyboard'), e.target.value);
        });
    </script>
</body>

            }

        window.openKeyboard = function() {
            document.getElementById('hiddenInput').focus();

        document.getElementById('hiddenInput').addEventListener('input', (e) => {
            set(ref(db, 'remote_keyboard'), e.target.value);
        });
    </script>
</body>
</html>
