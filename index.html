<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HP Remote</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000000; 
            color: #FFFFFF; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow: hidden; 
        }
        
        .remote-case { 
            background: #111111; 
            width: 90%; 
            max-width: 320px; 
            height: 90%; 
            max-height: 700px;
            border-radius: 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            padding: 40px 20px;
            box-shadow: 0 0 40px rgba(255,255,255,0.03);
        }

        .header-text { color: #333; font-size: 12px; letter-spacing: 2px; font-weight: bold; }

        .d-pad { 
            position: relative; 
            width: 240px; 
            height: 240px; 
            background: #1f1f1f; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .center-ok { 
            width: 100px; height: 100px; 
            background: #333333; 
            border: none; border-radius: 50%; 
            color: white; font-weight: bold; font-size: 18px; 
            cursor: pointer; z-index: 5; 
        }
        .center-ok:active { background: #444; transform: scale(0.92); }
        
        .arrow { position: absolute; background: transparent; border: none; color: #FFFFFF; font-size: 24px; cursor: pointer; }
        .up { top: 10px; width: 100%; height: 60px; } 
        .down { bottom: 10px; width: 100%; height: 60px; } 
        .left { left: 10px; width: 60px; height: 100%; } 
        .right { right: 10px; width: 60px; height: 100%; }

        .controls { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .row { display: flex; justify-content: center; gap: 20px; width: 100%; }
        .nav-btn { 
            width: 65px; height: 65px; 
            background: #252525; 
            border: none; border-radius: 50%; 
            color: white; font-size: 20px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
        }
        .nav-btn.active { background: #FFFFFF; color: #000000; }

        .unlock-btn { 
            width: 100%; height: 55px; 
            background: #FFFFFF; color: #000000; 
            border: none; border-radius: 30px; 
            font-weight: bold; font-size: 15px; 
            cursor: pointer; 
        }
        
        #status { color: #555; font-size: 10px; text-transform: uppercase; margin: 0; }
        #hiddenInput { position: absolute; opacity: 0; pointer-events: none; }
        .apk-link { color: #444; text-decoration: none; font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="remote-case">
        <div class="header-text">HP HARSH OS 7</div>

        <div class="d-pad">
            <button class="arrow up" onclick="handleDirection('UP')">▲</button>
            <button class="arrow left" onclick="handleDirection('LEFT')">◀</button>
            <button class="center-ok" onclick="send('OK')">OK</button>
            <button class="arrow right" onclick="handleDirection('RIGHT')">▶</button>
            <button class="arrow down" onclick="handleDirection('DOWN')">▼</button>
        </div>

        <div class="controls">
            <div class="row">
                <button class="nav-btn" onclick="send('BACK')">↩</button>
                <button class="nav-btn" onclick="openKeyboard()">⌨</button>
                <button id="mouseBtn" class="nav-btn" onclick="toggleMouse()">🖱</button>
            </div>

            <button class="unlock-btn" onclick="send('UNLOCK')">UNLOCK SYSTEM</button>
            
            <p id="status">System Online</p>
            <a href="hp-remote.apk" class="apk-link" download>Download APK</a>
        </div>
    </div>

    <input type="text" id="hiddenInput">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADzCExTvEjwcjC6FK1kfmO7N-V_66nE",
            databaseURL: "https://hp-remote-web-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hp-remote-web"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let mouseMode = false;

        window.toggleMouse = function() {
            mouseMode = !mouseMode;
            const btn = document.getElementById('mouseBtn');
            btn.classList.toggle('active', mouseMode);
            document.getElementById('status').innerText = mouseMode ? "MOUSE MODE: ON" : "System Online";
        };

        window.handleDirection = function(dir) {
            send(mouseMode ? "MOUSE_" + dir : dir);
        };

        window.send = function(cmd) {
            set(ref(db, 'remote_command'), cmd);
            if(!mouseMode) {
                document.getElementById('status').innerText = "Sent: " + cmd;
                setTimeout(() => { document.getElementById('status').innerText = "System Online"; }, 800);
            }
        };

        window.openKeyboard = function() {
            document.getElementById('hiddenInput').focus();
        };

        document.getElementById('hiddenInput').addEventListener('input', (e) => {
            set(ref(db, 'remote_keyboard'), e.target.value);
        });
    </script>
</body>
